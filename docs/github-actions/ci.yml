name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest
      - name: Generate sample reports
        run: |
          release-risk tests/fixtures/risky_release.json --output reports/risky-release.json || test $? -eq 2
          release-risk tests/fixtures/risky_release.json --format markdown --output reports/risky-release.md || test $? -eq 2
      - name: Docker build
        run: docker build -f infra/docker/Dockerfile -t ci-cd-release-risk-scanner:ci .

